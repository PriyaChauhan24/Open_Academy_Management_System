<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Sign In | LearnUp Academy</title>
    <style>
        :root {
            --primary-indigo: #4318FF;
            --bg-light: #f4f7fe;
            --text-navy: #1b2559;
            --text-grey: #a3aed0;
        }

        body { background-color: var(--bg-light); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }

        .auth-wrapper { display: flex; width: 1000px; height: 650px; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0px 40px 100px rgba(112, 144, 176, 0.15); }

        .auth-banner { flex: 1; background: linear-gradient(135deg, #868CFF 0%, #4318FF 100%); display: flex; flex-direction: column; justify-content: center; padding: 60px; color: white; position: relative; }

        .auth-form-container { flex: 1.2; padding: 80px; display: flex; flex-direction: column; justify-content: center; }

        .form-control-custom { background: #f4f7fe; border: 1px solid #e0e5f2; border-radius: 16px; padding: 16px; margin-bottom: 20px; width: 100%; outline: none; color: var(--text-navy); font-weight: 500; }

        .btn-auth { background: var(--primary-indigo); color: white; border: none; border-radius: 16px; padding: 16px; font-weight: 700; width: 100%; transition: 0.3s; box-shadow: 0px 10px 20px rgba(67, 24, 255, 0.2); }

        .btn-face-id { background: #fff; color: var(--primary-indigo); border: 2px solid var(--primary-indigo); border-radius: 16px; padding: 14px; width: 100%; font-weight: 700; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; cursor: pointer; }

        /* Camera Modal Styling */
        #video { border-radius: 20px; background: #000; width: 100%; }
        .modal-content { border-radius: 30px; border: none; }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-banner text-start">
        <h1 class="fw-bold display-4 mb-3">LearnUp</h1>
        <p class="fs-5 opacity-75">Join the future of education with AI-powered face authentication.</p>
        <div class="mt-5 pt-4">
            <div class="d-flex align-items-center mb-3"><span>✔</span> <span class="ms-3">Biometric Face Login</span></div>
            <div class="d-flex align-items-center mb-3"><span>✔</span> <span class="ms-3">Odoo-Style Dashboard</span></div>
        </div>
    </div>

    <div class="auth-form-container">
        <h2 class="fw-bold mb-2 text-navy">Welcome Back!</h2>
        <p class="text-muted mb-5">Please enter your details or use Face ID.</p>

        <form method="POST">
            {% csrf_token %}
            <label class="small fw-bold text-navy mb-2 ps-1">Enrollment Number</label>
            <input type="text" name="username" class="form-control-custom" placeholder="e.g. 210101001" required>

            <label class="small fw-bold text-navy mb-2 ps-1">Password</label>
            <input type="password" name="password" class="form-control-custom" placeholder="••••••••" required>

            <button type="submit" class="btn-auth">Sign In</button>
        </form>

        <div class="text-center my-4 text-muted small fw-bold">OR LOGIN WITH</div>

        <button type="button" class="btn-face-id" data-bs-toggle="modal" data-bs-target="#faceModal" onclick="startCamera()">
            <span style="font-size: 1.2rem;">👤</span> Face ID Authentication
        </button>
    </div>
</div>

<div class="modal fade" id="faceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4 text-center">
            <h4 class="fw-bold text-navy mb-3">Face Verification</h4>
            <video id="video" autoplay muted></video>
            <canvas id="canvas" style="display:none;"></canvas>
            
            <p id="status-msg" class="mt-3 text-muted">Position your face in the center</p>
            
            <button id="capture-btn" class="btn-auth mt-2">Scan & Verify</button>
            <button type="button" class="btn text-muted mt-2" data-bs-dismiss="modal" onclick="stopCamera()">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const statusMsg = document.getElementById('status-msg');
    let streamPtr = null;

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                streamPtr = stream;
            })
            .catch(err => {
                statusMsg.innerText = "Camera Error: Check your HP Victus privacy shutter.";
                statusMsg.style.color = "red";
            });
    }

    function stopCamera() {
        if (streamPtr) {
            streamPtr.getTracks().forEach(track => track.stop());
        }
    }

    captureBtn.addEventListener('click', () => {
        statusMsg.innerText = "Processing Biometrics...";
        
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL('image/jpeg');

        fetch("{% url 'face_login_verify' %}", {
            method: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}",
                "Content-Type": "application/x-www-form-urlencoded",
            },
            body: new URLSearchParams({ 'image_data': imageData })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                statusMsg.style.color = "green";
                statusMsg.innerText = "Verified! Redirecting...";
                window.location.href = data.redirect;
            } else {
                statusMsg.style.color = "red";
                statusMsg.innerText = data.message;
            }
        })
        .catch(error => {
            statusMsg.innerText = "System Error. Check Console.";
        });
    });
</script>

</body>
</html>
