<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Create Account | LearnUp Academy</title>
    
    <style>
        :root {
            --primary-indigo: #4318FF;
            --bg-light: #f4f7fe;
            --text-navy: #1b2559;
            --text-grey: #a3aed0;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-wrapper {
            display: flex;
            width: 1000px;
            height: 650px;
            background: #fff;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0px 40px 100px rgba(112, 144, 176, 0.15);
        }

        /* Left Side: Branding */
        .auth-banner {
            flex: 1;
            background: linear-gradient(135deg, #4318FF 0%, #111c44 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            color: white;
            position: relative;
        }

        /* Right Side: Form Container */
        .auth-form-container {
            flex: 1.2;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: #fff;
        }

        /* Custom Form Inputs */
        .form-control-custom {
            background: #f4f7fe;
            border: 1px solid #e0e5f2;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 15px;
            width: 100%;
            outline: none;
            transition: 0.3s;
        }

        .form-control-custom:focus {
            border-color: var(--primary-indigo);
            background: #fff;
        }

        /* Role Selector Styling */
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn-check:checked + .btn-outline-primary {
            background-color: var(--primary-indigo);
            color: white;
            border-color: var(--primary-indigo);
        }

        .btn-outline-primary {
            border-color: #e0e5f2;
            color: var(--text-grey);
            border-radius: 14px;
            padding: 12px;
            font-weight: 600;
        }

        .btn-outline-primary:hover {
            background-color: #f4f7fe;
            color: var(--primary-indigo);
            border-color: var(--primary-indigo);
        }

        /* Submit Button */
        .btn-auth {
            background: var(--primary-indigo);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0px 10px 20px rgba(67, 24, 255, 0.2);
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0px 15px 30px rgba(67, 24, 255, 0.3);
        }

        .text-navy { color: var(--text-navy); }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-banner">
        <h1 class="fw-bold display-5 mb-4">LearnUp</h1>
        <p class="fs-5 opacity-75">Start your engineering journey with our AI-powered academy management system.</p>
        <div class="mt-5">
            <div class="d-flex align-items-center mb-3">
                <span class="me-3">✔</span> <span>Student & Teacher Portals</span>
            </div>
            <div class="d-flex align-items-center mb-3">
                <span class="me-3">✔</span> <span>Real-time Progress Tracking</span>
            </div>
            <div class="d-flex align-items-center">
                <span class="me-3">✔</span> <span>Biometric Security Integration</span>
            </div>
        </div>
    </div>

    <div class="auth-form-container">
        <h2 class="fw-bold mb-2 text-navy">Create Account</h2>
        <p class="text-muted mb-4">Choose your role and fill in your details.</p>

        <form method="POST" action="">
            {% csrf_token %}

            <div class="role-selector mb-3">
                <input type="radio" class="btn-check" name="role" id="student" value="student" checked autocomplete="off">
                <label class="btn btn-outline-primary w-50" for="student">🎓 Student</label>

                <input type="radio" class="btn-check" name="role" id="teacher" value="teacher" autocomplete="off">
                <label class="btn btn-outline-primary w-50" for="teacher">👨‍🏫 Teacher</label>
            </div>

            <label class="small fw-bold text-navy mb-1 ps-1">Full Name</label>
            <input type="text" name="username" class="form-control-custom" placeholder="Priya Patel" required>
            
            <label class="small fw-bold text-navy mb-1 ps-1">Email Address</label>
            <input type="email" name="email" class="form-control-custom" placeholder="priya@example.com" required>
            
            <label class="small fw-bold text-navy mb-1 ps-1">Create Password</label>
            <input type="password" name="password" class="form-control-custom" placeholder="Min. 8 characters" required>

            <button type="submit" class="btn-auth shadow-sm">Register Now</button>
        </form>

        <p class="mt-4 text-center small text-muted">
            Already have an account? <a href="/login/" class="text-primary fw-bold text-decoration-none">Sign In</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
