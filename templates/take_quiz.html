<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Quiz: {{ lesson.title }}</title>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Quiz: {{ lesson.title }}</h4>
                    </div>
                    <form method="POST" class="card-body">
                        {% csrf_token %}
                        {% for q in questions %}
                        <div class="mb-4 p-3 border rounded bg-white">
                            <p class="fw-bold">{{ forloop.counter }}. {{ q.question_text }}</p>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="1" id="q{{ q.id }}a1" required>
                                <label class="form-check-label" for="q{{ q.id }}a1">{{ q.option1 }}</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="2" id="q{{ q.id }}a2">
                                <label class="form-check-label" for="q{{ q.id }}a2">{{ q.option2 }}</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="3" id="q{{ q.id }}a3">
                                <label class="form-check-label" for="q{{ q.id }}a3">{{ q.option3 }}</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="4" id="q{{ q.id }}a4">
                                <label class="form-check-label" for="q{{ q.id }}a4">{{ q.option4 }}</label>
                            </div>
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-success w-100 py-2">Submit All Answers</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
