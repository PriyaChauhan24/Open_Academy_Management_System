<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{ lesson.title }} | Open Academy</title>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-9 p-4">
                <h3>{{ lesson.title }}</h3>
                <div class="ratio ratio-16x9 shadow-sm rounded overflow-hidden mt-3">
                    <iframe src="{{ lesson.video_url }}" allowfullscreen></iframe>
                </div>
                
                <div class="mt-4 p-4 bg-white rounded shadow-sm">
                    <h5>Ready for the Quiz?</h5>
                    <p class="text-muted">You must finish the video before taking the 10-question quiz.</p>
                    <a href="{% url 'take_quiz' lesson.id %}" class="btn btn-primary">Start Lesson Quiz</a>
                </div>
            </div>

            <div class="col-md-3 bg-white border-start vh-100 p-4">
                <h5>Course Content</h5>
                <div class="list-group mt-3">
                    {% for l in all_lessons %}
                        <a href="{% url 'watch_lesson' l.id %}" class="list-group-item list-group-item-action {% if l.id == lesson.id %}active{% endif %}">
                            {{ l.order }}. {{ l.title }}
                        </a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
