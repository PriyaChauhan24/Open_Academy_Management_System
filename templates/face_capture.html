<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #0b0e14; color: white; font-family: 'DM Sans', sans-serif; }
        .scanner-container {
            max-width: 500px; margin: 50px auto; position: relative;
            background: #1a1f2b; border-radius: 30px; padding: 30px;
            box-shadow: 0 0 40px rgba(67, 24, 255, 0.3);
        }
        #video { border-radius: 20px; border: 2px solid #4318FF; background: #000; width: 100%; }
        .scan-line {
            position: absolute; width: 90%; height: 2px; background: #4318FF;
            top: 40px; left: 5%; box-shadow: 0 0 15px #4318FF;
            animation: scan 3s infinite linear; z-index: 10;
        }
        @keyframes scan { 0% { top: 40px; } 50% { top: 300px; } 100% { top: 40px; } }
        .status-badge { background: rgba(67, 24, 255, 0.1); color: #868CFF; border-radius: 10px; padding: 10px; font-size: 0.8rem; }
        
        /* Styling for the Skip Link to match your theme */
        .skip-link { color: #868CFF; text-decoration: none; transition: 0.3s; font-size: 0.9rem; }
        .skip-link:hover { color: #4318FF; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="scanner-container text-center">
        <h4 class="fw-bold mb-2">AI Biometric Registration</h4>
        <p class="text-muted small mb-4">Position your face within the frame for verification</p>
        
        <div class="position-relative">
            <div class="scan-line"></div>
            <video id="video" autoplay muted></video>
        </div>
        
        <div id="error-msg" class="alert alert-danger mt-3 d-none"></div>
        
        <button id="capture-btn" class="btn btn-primary w-100 rounded-pill py-3 mt-4 fw-bold shadow">
            START IDENTITY SCAN
        </button>
        
        <div class="mt-4 pt-2 border-top border-secondary">
            <p class="text-muted small mb-1">Having trouble with your camera?</p>
            <a href="{% url 'dashboard' %}" class="skip-link fw-bold">
                Skip for now & go to Dashboard <i class="bi bi-arrow-right-short"></i>
            </a>
        </div>
        
        <div class="status-badge mt-4">
            <i class="bi bi-shield-check"></i> Encrypted End-to-End Verification
        </div>
    </div>

    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('video');
        const captureBtn = document.getElementById('capture-btn');
        const errorMsg = document.getElementById('error-msg');

        // Access webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => {
                errorMsg.innerText = "Camera Error: Please check your privacy shutter.";
                errorMsg.classList.remove('d-none');
            });

        captureBtn.addEventListener('click', () => {
            captureBtn.innerHTML = "SCANNING...";
            captureBtn.disabled = true;
            
            const canvas = document.getElementById('canvas');
            canvas.getContext('2d').drawImage(video, 0, 0);
            const dataURL = canvas.toDataURL('image/jpeg');

            fetch('', {
                method: 'POST',
                headers: { 
                    'X-CSRFToken': '{{ csrf_token }}', 
                    'Content-Type': 'application/x-www-form-urlencoded' 
                },
                body: 'image_data=' + encodeURIComponent(dataURL)
            })
            .then(r => r.json())
            .then(data => {
                if(data.status === 'success') {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.classList.remove('d-none');
                    captureBtn.innerHTML = "RE-SCAN IDENTITY";
                    captureBtn.disabled = false;
                }
            })
            .catch(err => {
                errorMsg.innerText = "Connection lost. Try skipping or checking VS Code.";
                errorMsg.classList.remove('d-none');
                captureBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
