<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Welcome | Open Academy</title>
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex align-items-center justify-content-center">
        <div class="card p-5 shadow-sm text-center" style="max-width: 500px;">
            <h2>Welcome to Open Academy!</h2>
            <p class="text-muted">Tell us how you want to use the platform:</p>
            
            <form method="POST" class="mt-4">
                {% csrf_token %}
                <div class="d-grid gap-3">
                    <button name="role" value="student" class="btn btn-primary btn-lg">I want to Learn (Student)</button>
                    <button name="role" value="teacher" class="btn btn-outline-dark btn-lg">I want to Teach (Lecturer)</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
